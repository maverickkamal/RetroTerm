<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroTerm</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1 class="popup-title">RETROTERM</h1>
      <p class="popup-version">v2.6 AMBER BUILD</p>
    </div>

    <div class="popup-divider"></div>

    <div class="toggle-row master-row">
      <span class="toggle-label">▮ MASTER POWER</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-master" checked>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
    </div>

    <div class="popup-divider dim"></div>

    <div class="sites-section">
      <p class="section-label">SITE OVERRIDES</p>

      <div class="toggle-row">
        <span class="toggle-label">GITHUB</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-github" checked>
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">HACKCLUB</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-hackclub" checked>
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">CARNIVAL</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-carnival" checked>
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
        </label>
      </div>
    </div>

    <div class="popup-divider"></div>

    <div class="sites-section">
      <p class="section-label">INTENSITY CONTROLS</p>

      <div class="slider-row">
        <span class="slider-label">AMBER <span id="amber-val">80</span>%</span>
        <input type="range" id="slider-amber" min="30" max="100" value="80" class="rt-slider">
      </div>

      <div class="slider-row">
        <span class="slider-label">SCANLINE <span id="scanline-val">40</span>%</span>
        <input type="range" id="slider-scanline" min="0" max="80" value="40" class="rt-slider">
      </div>
    </div>

    <div class="popup-divider"></div>

    <div class="popup-footer">
      <p class="popup-status" id="status-text">▮ ALL SYSTEMS ONLINE</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
